name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      app-name:
        description: 'Tên ứng dụng (dùng để gắn thẻ hình ảnh)'
        required: true
        type: string
    secrets:
      docker-username:
        description: 'Tên đăng nhập Docker registry'
        required: true
      docker-password:
        description: 'Mật khẩu Docker registry'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker-username }}
          password: ${{ secrets.docker-password }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.docker-username }}/${{ inputs.app-name }}:${{ github.sha }}