name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      app-name:
        description: 'Tên ứng dụng (dùng để gắn thẻ hình ảnh)'
        required: true
        type: string
      environment:
        required: true
        type: string
      context-path:
        description: 'Path to the build context (relative to repository root). Example: . or docker/'
        required: false
        default: '.'
        type: string
      dockerfile-path:
        description: 'Path to the Dockerfile (relative to repository root). Example: Dockerfile or docker/Dockerfile'
        required: false
        default: 'Dockerfile'
        type: string
    secrets:
      docker-username:
        description: 'Tên đăng nhập Docker registry'
        required: true
      docker-password:
        description: 'Mật khẩu Docker registry'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker-username }}
          password: ${{ secrets.docker-password }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context-path }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ secrets.docker-username }}/${{ inputs.app-name }}:${{ github.sha }}