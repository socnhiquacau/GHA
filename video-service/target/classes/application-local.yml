spring:
  application:
    name: video-service
  datasource:
    url: jdbc:mariadb://localhost:3306/playlist_service_db
    username: root
    password: TODO
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
server:
  port: ${SERVER_PORT:8081}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}
logging:
  level:
    org.springframework.web.servlet.DispatcherServlet: DEBUG